server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't leak the nginx version
  server_tokens off;

  # next.config.ts uses trailingSlash: true, so routes are folders with
  # index.html. Resolve clean URLs, then fall back to the home page.
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # The generated OG image is a extensionless file named "opengraph-image";
  # force the correct content-type so scrapers render it.
  location = /opengraph-image {
    default_type image/png;
  }

  # Long-cache fingerprinted build assets
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  error_page 404 /404.html;

  # Basic security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
